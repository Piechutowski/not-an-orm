id = "edbml"
name = "EDBML"
version = "0.1.0"
schema_version = 1
authors = ["Szymon Piechutowski <106471045+Piechutowski@users.noreply.github.com>"]
description = "EDBML (Extended Database Markup Language) support: syntax highlighting and language server."
repository = "https://github.com/Piechutowski/not-an-orm"

[language_servers.edbml-ls]
name = "EDBML Language Server"
languages = ["EDBML"]

# The grammar is loaded from a local git mirror of ../tree-sitter-edbml.
# `repository` and `commit` below are machine-specific and are rewritten by
# scripts/sync-grammar.sh — run it once after cloning and after every grammar
# change, then use `zed: install dev extension` / Rebuild.
[grammars.edbml]
repository = "file:///SET-BY-scripts/sync-grammar.sh"
commit = "0000000000000000000000000000000000000000"
